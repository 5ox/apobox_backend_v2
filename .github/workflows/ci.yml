name: CI

on:
  push:
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'APO_Box_Account_Codebase_Review.docx'
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    name: PHP 8.2 Tests

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: apobox_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    env:
      APP_ENV: testing
      APP_KEY: base64:dGVzdGluZ2tleXRoYXRpczMyYnl0ZXM=
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: apobox_test
      DB_USERNAME: root
      DB_PASSWORD: password
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: 127.0.0.1

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, bcmath, soap, intl, gd, redis
          coverage: xdebug

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run database seeder
        run: php artisan db:seed --force

      - name: Run tests
        run: php artisan test --parallel

      - name: Run Pint (code style)
        run: vendor/bin/pint --test
        continue-on-error: true

  assets:
    runs-on: ubuntu-latest
    name: Frontend Build

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build
