version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apobox-app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    depends_on:
      - mysql
      - redis
    networks:
      - apobox

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apobox-horizon
    restart: unless-stopped
    command: php artisan horizon
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      - mysql
      - redis
    networks:
      - apobox

  mysql:
    image: mysql:8.0
    container_name: apobox-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-apobox}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-apobox}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - apobox

  redis:
    image: redis:7-alpine
    container_name: apobox-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - apobox

volumes:
  mysql-data:
  redis-data:

networks:
  apobox:
    driver: bridge
