<html>
  <head>
    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
  </head>
  <body>
    <a href="http://www2.apobox.com/signup.php">Signup for APO Box</a>
    <script
      src="https://account.apobox.com/widgets/signup.js"
      data-redirect="https://account.apobox.com/customers/almost-finished"
      data-button="false"
    ></script>
    <script>
      jQuery(document).ready(function() {
        jQuery('a[href="http://www2.apobox.com/signup.php"],a[href="https://www2.apobox.com/signup.php"]').click(function (e) {
          e.preventDefault();
          // Get the widget iframe as a jQuery object
          var iframe = document.getElementById('APO-Box-signup-widget');
          iframe.style.display = 'block';
          iframe.contentWindow.postMessage({
            method: 'open'
          }, 'https://account.apobox.com');
        });
		jQuery(window).on("message", function (e) {
		  switch (e.originalEvent.data.method) {
			case 'autofill':
			  console.log('autofill');
			  break;
			case 'ready':
			  console.log('ready');
			  break;
			case 'authenticated':
			  console.log('authenticated');
			  // Do things here after the user logs in
			  break;
			case 'customer.created':
			  console.log('customer created');
			  // If you need to do things after the user creates an account
			  // but before they complete their shipping address you can do that here
			  break;
			case 'signup.complete':
			  console.log('signup complete');
			  // If you need to do any special logic after signup is complete that
			  // isn't related to autocomplete this is the place to do that.
			  break;
			case 'error.validation':
			  console.log('error validation');
			  // Fired when a form validation fails.
			  break;
			case 'error.fatal':
			  console.log('error fatal');
			  // Considered a "500" error. Something went really wrong if this fires.
			  break;
			default:
			  // A message was sent with a message that you don't have a switch case for
			  break;
		  }
		});
      });
    </script>
  </body>
</html>
