<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js" ></script>
    <style>
      input, select {
        font-size: 18px;
      }
      label {
        display: inline-block;
        width: 110px;
        padding-right: 4px;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <script
      src="https://account.apobox.com/widgets/signup.js"
      data-autofill="true"
    ></script>
    <form>
      <label for="firstName">First Name:</label>
      <input type="text" id="" name="firstName"><br>
      <label for="lastName">Last Name:</label>
      <input type="text" id="" name="lastName"><br>
      <label for="addressLine1">Address Line 1:</label>
      <input type="text" id="" name="addressLine1"><br>
      <label for="addressLine2">Address Line 2:</label>
      <input type="text" id="" name="addressLine2"><br>
      <label for="city">City:</label>
      <input type="text" id="" name="city"><br>
      <label for="state">State:</label>
      <select id="" name="state">
        <option value="AL">Alabama</option>
        <option value="AK">Alaska</option>
        <option value="AZ">Arizona</option>
        <option value="AR">Arkansas</option>
        <option value="CA">California</option>
        <option value="CO">Colorado</option>
        <option value="CT">Connecticut</option>
        <option value="DE">Delaware</option>
        <option value="DC">District Of Columbia</option>
        <option value="FL">Florida</option>
        <option value="GA">Georgia</option>
        <option value="HI">Hawaii</option>
        <option value="ID">Idaho</option>
        <option value="IL">Illinois</option>
        <option value="IN">Indiana</option>
        <option value="IA">Iowa</option>
        <option value="KS">Kansas</option>
        <option value="KY">Kentucky</option>
        <option value="LA">Louisiana</option>
        <option value="ME">Maine</option>
        <option value="MD">Maryland</option>
        <option value="MA">Massachusetts</option>
        <option value="MI">Michigan</option>
        <option value="MN">Minnesota</option>
        <option value="MS">Mississippi</option>
        <option value="MO">Missouri</option>
        <option value="MT">Montana</option>
        <option value="NE">Nebraska</option>
        <option value="NV">Nevada</option>
        <option value="NH">New Hampshire</option>
        <option value="NJ">New Jersey</option>
        <option value="NM">New Mexico</option>
        <option value="NY">New York</option>
        <option value="NC">North Carolina</option>
        <option value="ND">North Dakota</option>
        <option value="OH">Ohio</option>
        <option value="OK">Oklahoma</option>
        <option value="OR">Oregon</option>
        <option value="PA">Pennsylvania</option>
        <option value="RI">Rhode Island</option>
        <option value="SC">South Carolina</option>
        <option value="SD">South Dakota</option>
        <option value="TN">Tennessee</option>
        <option value="TX">Texas</option>
        <option value="UT">Utah</option>
        <option value="VT">Vermont</option>
        <option value="VA">Virginia</option>
        <option value="WA">Washington</option>
        <option value="WV">West Virginia</option>
        <option value="WI">Wisconsin</option>
        <option value="WY">Wyoming</option>
      </select>
      <br>
      <label for="zip">Zip Code:</label>
      <input type="text" id="" name="zip"><br>
    </form>
    <script>
      $(window).on("message", function (e) {
        // A switch case works well here
        switch (e.originalEvent.data.method) {
          case 'autofill':
            console.log('autofill');
            $('input[name="firstName"]').val(e.originalEvent.data.address.firstName);
            $('input[name="lastName"]').val(e.originalEvent.data.address.lastName);
            $('input[name="addressLine1"]').val(e.originalEvent.data.address.line1);
            $('input[name="addressLine2"]').val(e.originalEvent.data.address.line2);
            $('input[name="city"]').val(e.originalEvent.data.address.city);
            $('select[name="state"]').val(e.originalEvent.data.address.state);
            $('input[name="zip"]').val(e.originalEvent.data.address.zip);
            break;
          case 'ready':
            console.log('ready');
            break;
          case 'authenticated':
            console.log('authenticated');
            // Do things here after the user logs in
            break;
          case 'customer.created':
            console.log('customer created');
            // If you need to do things after the user creates an account
            // but before they complete their shipping address you can do that here
            break;
          case 'signup.complete':
            console.log('signup complete');
            // If you need to do any special logic after signup is complete that
            // isn't related to autocomplete this is the place to do that.
            break;
          case 'error.validation':
            console.log('error validation');
            // Fired when a form validation fails.
            break;
          case 'error.fatal':
            console.log('error fatal');
            // Considered a "500" error. Something went really wrong if this fires.
            break;
          default:
            // A message was sent with a message that you don't have a switch case for
            break;
        }
      });
    </script>
  </body>
</html>
